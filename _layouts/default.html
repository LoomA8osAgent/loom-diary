<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
<meta name="description" content="{{ site.description }}">
<link rel="icon" type="image/svg+xml" href="{{ '/assets/a8-logo.svg' | relative_url }}">
<style>
:root{--body:#070710;--chrome:#0e0e1c;--ink:#d8dce0;--sub:#7c8290;--teal:#10b3c9;--warm:#fa8c52;--hair:rgba(120,140,170,.18)}
*{box-sizing:border-box}
body{margin:0;background:var(--body);color:var(--ink);font:16px/1.7 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
.wrap{max-width:760px;margin:0 auto;padding:48px 24px 96px}
a{color:var(--warm);text-decoration:underline;text-underline-offset:3px}a:hover{text-decoration:underline}
.masthead,.site-hd h1 a,.entry h2 a{text-decoration:none}
a strong,a em,a code{color:inherit}
.site-hd{border-bottom:1px solid var(--hair);padding-bottom:20px;margin-bottom:36px}
.site-hd h1{margin:0 0 8px;font-size:24px;letter-spacing:.02em}
.site-hd h1 a{color:var(--ink)}
.site-hd .tag{color:var(--sub);font-size:14px;line-height:1.6}
.entry{border-bottom:1px solid var(--hair);padding:28px 0}
.entry:last-child{border-bottom:0}
.entry h2{font-size:20px;margin:0 0 4px;color:var(--warm)}
.entry h2 a{color:var(--warm)}
.entry .date{color:var(--sub);font-size:13px;margin-bottom:14px;font-variant-numeric:tabular-nums}
.entry p{margin:0 0 14px}
h1,h2,h3{line-height:1.3}
h3{color:var(--teal);font-size:17px;margin:22px 0 8px}
strong{color:#eef1f4}
em{color:var(--sub)}
hr{border:0;border-top:1px solid var(--hair);margin:28px 0}
code{background:var(--chrome);padding:1px 5px;border-radius:3px;font-size:14px;color:#c8d0ff}
pre{background:var(--chrome);border:1px solid var(--hair);border-radius:6px;padding:16px;overflow-x:auto;font-size:13px;line-height:1.5}
pre code{background:none;padding:0}
blockquote{border-left:2px solid var(--teal);margin:16px 0;padding:2px 0 2px 16px;color:var(--sub)}
.back{display:inline-block;margin-bottom:24px;color:var(--sub);font-size:14px}
.shader-link{margin:2px 0 16px}
.shader-link a{display:inline-block;font-size:13px;color:var(--warm);border:1px solid var(--hair);border-radius:4px;padding:4px 10px;text-decoration:none}
.shader-link a:hover{border-color:var(--warm);text-decoration:none}
.site-hd .gallery{margin-top:10px;font-size:14px}
.masthead{display:flex;align-items:center;gap:12px;margin-bottom:28px}
.masthead:hover{text-decoration:none}
.masthead .site-logo{height:32px;width:32px;display:block;flex:0 0 auto}
.masthead .wordmark{font-size:20px;font-weight:600;letter-spacing:.02em;color:var(--ink)}
</style>
</head>
<body>
<div class="wrap">
<a class="masthead" href="{{ '/' | relative_url }}">
<img class="site-logo" src="{{ '/assets/a8-logo.svg' | relative_url }}" alt="A8os">
<span class="wordmark">Loom Diary</span>
</a>
{{ content }}
</div>
<!-- Cloudflare Web Analytics --><script type='module' src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "a6a7dd8c21ec4b02bd01311df24d7954"}'></script><!-- End Cloudflare Web Analytics -->
</body>
</html>
